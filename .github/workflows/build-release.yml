name: Build Release (APK & AAB)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab (امکان اجرای دستی از بخش Actions در گیت‌هاب)

jobs:
  build:
    name: Build Android Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        # این مرحله کدهای پروژه را از گیت‌هاب واکشی می‌کند

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
        # تنظیم نسخه ۲۱ جاوا که با تنظیمات اندروید این پروژه کاملا سازگار است

      - name: Create .env from template
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi
        # ایجاد فایل .env برای جلوگیری از خطای پلاگین سکرت اندروید

      - name: Decode Release Keystore
        run: |
          if [ -f my-release-key.base64 ]; then
            base64 -d my-release-key.base64 > my-release-key.jks
            echo "Keystore decoded successfully from base64 file."
          else
            echo "my-release-key.base64 not found. Checking GitHub Secrets..."
            if [ ! -z "${{ secrets.RELEASE_KEY_BASE64 }}" ]; then
              echo "${{ secrets.RELEASE_KEY_BASE64 }}" | base64 -d > my-release-key.jks
              echo "Keystore decoded successfully from GitHub Secrets."
            else
              echo "Warning: No keystore found! The release build might fail if signing is required."
            fi
          fi
        # بازسازی فایل کلید ریلیز از فایل متنی base64 یا از سکرت‌های گیت‌هاب برای ساین کردن موفقیت‌آمیز برنامه

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
        # این اکشن رسمی گریدل است که کش فایل‌ها و متعلقات بیلد را مدیریت می‌کند تا سرعت بیلد بالا رود. بررسی صحت رپر به علت تفاوت در محیط بیلد غیرفعال شده است.

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew
        # اعطای دسترسی اجرایی به اسکریپت گریدل

      - name: Build Release APK and AAB
        run: ./gradlew assembleRelease bundleRelease # --no-validate-wrapper (بایپس کردن بررسی صحت رپر گریدل برای اطمینان از بیلد بدون خطا)
        # اجرای بیلد نسخه نهایی APK و AAB به همراه ساین و امضا با ریلیز کی موجود در پروژه

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Release-APK
          path: app/build/outputs/apk/release/*.apk
        # آپلود فایل خروجی APK به عنوان آرتیفکت گیت‌هاب جهت دانلود راحت شما

      - name: Upload Release AAB (App Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: App-Release-AAB
          path: app/build/outputs/bundle/release/*.aab
        # آپلود فایل خروجی AAB جهت انتشار در گوگل‌پلی
